name: trendwatch
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Manual runs ALWAYS bypass once-per-day idempotency — they're
    # intentional by definition, no checkbox to forget.
jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r trendwatch/requirements.txt
      - run: python trendwatch/trendwatch.py ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit daily digest
        if: success()
        run: |
          git config user.name "trendwatch-bot"
          git config user.email "trendwatch@users.noreply.github.com"
          git add digests/
          git diff --cached --quiet || git commit -m "chore: trendwatch digest $(date -u +%Y-%m-%d)"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push
