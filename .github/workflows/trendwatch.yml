name: trendwatch
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Manual runs ALWAYS bypass once-per-day idempotency — they're
    # intentional by definition, no checkbox to forget.
  push:
    branches: [main]
    paths:
      - '.github/trigger-trendwatch'
    # Touch .github/trigger-trendwatch (any change) → run trendwatch
    # with --force. Lets an operator trigger from another machine
    # without going through the Actions UI. paths-scoped so digest
    # commit-back to digests/** never re-triggers (no loop).
jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r trendwatch/requirements.txt
      - run: python trendwatch/trendwatch.py ${{ github.event_name != 'schedule' && '--force' || '' }}
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional PAT with its own code-search quota - dodges the shared
          # secondary rate limit that 429s code search on Actions runners.
          GH_SEARCH_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
          # Reddit script-app creds (reddit.com/prefs/apps). Without them the
          # public endpoint answers 403 Blocked from Actions IPs and the
          # Reddit source contributes nothing.
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      - name: Commit daily digest
        if: success()
        run: |
          git config user.name "trendwatch-bot"
          git config user.email "trendwatch@users.noreply.github.com"
          git add digests/
          git diff --cached --quiet || git commit -m "chore: trendwatch digest $(date -u +%Y-%m-%d)"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push
