name: opensource
on:
  schedule:
    - cron: '0 10 */3 * *'   # ~every 3 days at 10:00 UTC
  workflow_dispatch:
    # Manual runs ALWAYS bypass once-per-day idempotency.
  push:
    branches: [main]
    paths:
      - '.github/trigger-opensource'
    # Touch .github/trigger-opensource → run pipeline with --force.
    # paths-scoped so digest commit-back to digests/opensource/** never loops.
jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r trendwatch/requirements.txt
      - run: python opensource/opensource.py ${{ github.event_name != 'schedule' && '--force' || '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_SEARCH_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
      - name: Commit opensource digest
        if: success()
        run: |
          git config user.name "opensource-bot"
          git config user.email "opensource@users.noreply.github.com"
          git add digests/opensource/
          git diff --cached --quiet || git commit -m "chore: opensource digest $(date -u +%Y-%m-%d)"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push
