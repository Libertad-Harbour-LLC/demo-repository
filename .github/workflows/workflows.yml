name: workflows
on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC daily
  workflow_dispatch:
    # Manual runs ALWAYS bypass once-per-day idempotency.
  push:
    branches: [main]
    paths:
      - '.github/trigger-workflows'
    # Touch .github/trigger-workflows → run pipeline with --force.
    # paths-scoped so digest commit-back to digests/workflows/** never
    # re-triggers (no loop).
jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r trendwatch/requirements.txt
      - run: python workflows/workflows.py ${{ github.event_name != 'schedule' && '--force' || '' }}
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional PAT with its own code-search quota - dodges the shared
          # secondary rate limit that 429s code search on Actions runners.
          GH_SEARCH_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
      - name: Commit daily workflow digest
        if: success()
        run: |
          git config user.name "workflows-bot"
          git config user.email "workflows@users.noreply.github.com"
          git add digests/workflows/
          git diff --cached --quiet || git commit -m "chore: workflows digest $(date -u +%Y-%m-%d)"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push
